<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
        // window.location.origin extracts the protocol + host combination
        // e.g., from "https://cv.narref.cat/ghost" it extracts "https://cv.narref.cat"
        window.location.replace(window.location.origin);
    </script>
</head>

<body>
    <p>If you are not redirected automatically, please <a id="fallback-link" href="#">click here</a>.</p>

    <script>
        // Emergency fallback in case the browser has JavaScript disabled or restricted
        document.getElementById('fallback-link').href = window.location.origin;
    </script>
</body>

</html>
